# docker-compose.yml – Meilisearch pre full-text vyhľadávanie dokumentov
#
# Spustenie (len Meilisearch):
#   docker-compose up meilisearch -d
#
# Zastavenie:
#   docker-compose down
#
# Premenné prostredia:
#   MEILI_MASTER_KEY – api kľúč, nastav aj v backend/.env

version: '3.8'

services:
  meilisearch:
    image: getmeili/meilisearch:v1.6
    ports:
      - "7700:7700"
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:-changeme-dev-key}"
    volumes:
      - meili-data:/meili_data
    restart: unless-stopped

volumes:
  meili-data:
